<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traced</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0a0906;
      color: #f0ead8;
      font-family: 'DM Mono', ui-monospace, monospace;
      font-size: 12px;
    }
    header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: .1em;
      color: #d4952a;
    }
    .tagline { font-size: 9px; color: rgba(240,234,216,0.4); letter-spacing: .06em; }
    .search-wrap { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    input {
      width: 100%;
      background: #121009;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 11px;
      color: #f0ead8;
      outline: none;
    }
    input:focus { border-color: #d4952a; }
    input::placeholder { color: rgba(240,234,216,0.3); }
    #result { padding: 0 16px 12px; }
    .brand-card {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px;
    }
    .brand-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: .02em; }
    .brand-owner { font-size: 10px; color: #d4952a; margin-bottom: 10px; }
    .brand-owner.independent { color: #3a8a5a; }
    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .score { font-size: 28px; font-weight: 700; line-height: 1; }
    .bar-bg { flex: 1; background: rgba(255,255,255,0.06); border-radius: 3px; height: 3px; overflow: hidden; }
    .bar { height: 3px; border-radius: 3px; }
    .findings { font-size: 9px; color: rgba(240,234,216,0.5); line-height: 1.7; margin-bottom: 10px; }
    .finding { margin-bottom: 2px; }
    .card-actions { display: flex; gap: 8px; }
    .btn {
      flex: 1; text-align: center; padding: 7px 10px; border-radius: 6px;
      font-family: inherit; font-size: 9px; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
    }
    .btn-primary { background: #d4952a; color: #000; border: none; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: rgba(240,234,216,0.6); border: 1px solid rgba(255,255,255,0.1); }
    .status { padding: 12px 16px; font-size: 11px; color: rgba(240,234,216,0.4); }
    footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer a { font-size: 9px; color: rgba(240,234,216,0.35); text-decoration: none; letter-spacing: .06em; }
    footer a:hover { color: #d4952a; }
    .page-brands { padding: 8px 16px 4px; }
    .page-brand-label { font-size: 8px; color: rgba(240,234,216,0.3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }
    .page-brand-chip {
      display: inline-block; margin: 3px 4px 3px 0;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 10px; color: rgba(240,234,216,0.6);
      cursor: pointer;
    }
    .page-brand-chip:hover { border-color: #d4952a; color: #d4952a; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo">TRACED</div>
      <div class="tagline">Brand Intelligence</div>
    </div>
  </header>

  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search any brand..." autocomplete="off">
  </div>

  <div id="page-brands-wrap" style="display:none">
    <div class="page-brands">
      <div class="page-brand-label">Detected on this page</div>
      <div id="page-brand-chips"></div>
    </div>
  </div>

  <div id="result">
    <div class="status">Type a brand name above to look it up</div>
  </div>

  <footer>
    <a href="https://tracedhealth.com/contradiction" target="_blank">Contradiction Index</a>
    <a href="https://tracedhealth.com/transparency" target="_blank">Clean Brands</a>
    <a href="https://tracedhealth.com" target="_blank">tracedhealth.com</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>

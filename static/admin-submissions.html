<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Queue — Traced Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #161510;
    --panel: #1c1b16;
    --border: #2a2820;
    --border2: #383530;
    --ink: #f0ead8;
    --mid: #a09880;
    --dim: #6a6455;
    --gold: #c8a030;
    --gold-bg: rgba(200,160,48,0.08);
    --green: #3a8a52;
    --green-bg: rgba(58,138,82,0.1);
    --green-border: rgba(58,138,82,0.3);
    --red: #c04030;
    --red-bg: rgba(192,64,48,0.1);
    --red-border: rgba(192,64,48,0.3);
    --yellow: #c89030;
    --yellow-bg: rgba(200,144,48,0.1);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 300; min-height: 100vh; }

  nav {
    height: 52px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .nav-left { display: flex; align-items: center; gap: 16px; }
  .nav-logo { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--gold); text-decoration: none; text-transform: uppercase; }
  .nav-tag { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; padding: 4px 8px; border: 1px solid var(--border2); }
  .nav-counts { display: flex; gap: 16px; }
  .nav-count { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }
  .nav-count span { color: var(--gold); font-weight: 500; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 52px); }

  /* LEFT: QUEUE LIST */
  .queue-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    height: calc(100vh - 52px);
    position: sticky;
    top: 52px;
  }

  .queue-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .queue-header-title { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--dim); text-transform: uppercase; }

  .filter-tabs { display: flex; gap: 2px; }
  .filter-tab {
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-tab:hover { border-color: var(--border2); color: var(--mid); }
  .filter-tab.active { background: var(--gold-bg); border-color: var(--gold); color: var(--gold); }

  .queue-item {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .queue-item:hover { background: var(--surface); }
  .queue-item.active { background: var(--panel); border-left: 2px solid var(--gold); }

  .qi-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .qi-name { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.2; }
  .qi-status { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 7px; flex-shrink: 0; }
  .qi-status.pending { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(200,144,48,0.3); }
  .qi-status.approved { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .qi-status.rejected { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .qi-meta { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.05em; line-height: 1.4; }

  /* RIGHT: DETAIL */
  .detail-panel { padding: 40px 48px; overflow-y: auto; }

  .empty-detail {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--dim);
    text-align: center;
    padding: 80px 0;
  }
  .empty-detail-icon { font-size: 40px; opacity: 0.4; }
  .empty-detail-text { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

  .detail-content { display: none; }
  .detail-content.visible { display: block; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .detail-biz-name { font-size: 32px; font-weight: 600; line-height: 1; margin-bottom: 6px; }
  .detail-biz-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: 0.08em; line-height: 1.5; }

  .detail-ref { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.1em; padding: 8px 12px; border: 1px solid var(--border); background: var(--surface); text-align: right; }

  /* ACTION BUTTONS */
  .action-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }

  .action-btn {
    padding: 12px 24px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }
  .action-btn:hover { opacity: 0.8; }
  .action-btn:disabled { opacity: 0.3; cursor: default; }

  .btn-approve { background: var(--green); color: white; }
  .btn-reject { background: var(--red); color: white; }
  .btn-request { background: var(--surface); color: var(--mid); border: 1px solid var(--border2); }

  .action-result {
    display: none;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  .action-result.visible { display: block; }
  .action-result.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .action-result.error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* DATA SECTIONS */
  .data-section { margin-bottom: 28px; }

  .data-section-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .data-grid {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 0;
  }

  .data-row {
    display: contents;
  }

  .data-row > * {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.45;
  }

  .data-key { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; padding-right: 16px; }
  .data-val { color: var(--ink); }
  .data-val.highlight { color: var(--gold); font-weight: 500; }
  .data-val.green { color: var(--green); }
  .data-val.red { color: var(--red); }
  .data-val a { color: var(--gold); text-decoration: none; }
  .data-val a:hover { text-decoration: underline; }

  .story-block {
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 14px;
    color: var(--mid);
    line-height: 1.65;
    font-style: italic;
    margin-top: 8px;
  }

  /* ZONE SELECTOR */
  .zone-selector { display: flex; gap: 8px; margin-top: 8px; }
  .zone-opt {
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .zone-opt:hover { border-color: var(--border2); color: var(--mid); }
  .zone-opt.selected-green { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .zone-opt.selected-yellow { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
  .zone-opt.selected-red { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  .reject-reason {
    margin-top: 12px;
    display: none;
  }
  .reject-reason.visible { display: block; }
  .reject-reason textarea {
    width: 100%;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }
  .reject-reason textarea:focus { border-color: var(--red); }

  /* LOADING */
  .loading { padding: 60px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .queue-panel { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
    .detail-panel { padding: 24px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="https://traceddatabase.onrender.com" class="nav-logo">Traced</a>
    <span class="nav-tag">Admin · Submission Queue</span>
  </div>
  <div class="nav-counts">
    <span class="nav-count">Pending: <span id="countPending">—</span></span>
    <span class="nav-count">Approved: <span id="countApproved">—</span></span>
    <span class="nav-count">Rejected: <span id="countRejected">—</span></span>
  </div>
</nav>

<div class="layout">

  <!-- LEFT: QUEUE -->
  <div class="queue-panel">
    <div class="queue-header">
      <span class="queue-header-title">Submissions</span>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('pending')">Pending</button>
        <button class="filter-tab" onclick="setFilter('approved')">Approved</button>
        <button class="filter-tab" onclick="setFilter('all')">All</button>
      </div>
    </div>
    <div id="queueList"><div class="loading">Loading…</div></div>
  </div>

  <!-- RIGHT: DETAIL -->
  <div class="detail-panel">
    <div class="empty-detail" id="emptyDetail">
      <div class="empty-detail-icon">📋</div>
      <div class="empty-detail-text">Select a submission to review</div>
    </div>

    <div class="detail-content" id="detailContent">

      <div class="detail-header">
        <div>
          <div class="detail-biz-name" id="detailName"></div>
          <div class="detail-biz-meta" id="detailMeta"></div>
        </div>
        <div class="detail-ref" id="detailRef"></div>
      </div>

      <div class="action-result" id="actionResult"></div>

      <!-- ZONE ASSIGNMENT -->
      <div class="data-section">
        <div class="data-section-title">Assign Zone</div>
        <div class="zone-selector">
          <button class="zone-opt selected-green" id="zoneGreen" onclick="setZone('green')">🟢 Green — Independent</button>
          <button class="zone-opt" id="zoneYellow" onclick="setZone('yellow')">🟡 Yellow — VC-backed</button>
          <button class="zone-opt" id="zoneRed" onclick="setZone('red')">🔴 Red — Reject</button>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="action-bar">
        <button class="action-btn btn-approve" id="btnApprove" onclick="approveSubmission()">✓ Approve + Add to DB</button>
        <button class="action-btn btn-reject" id="btnReject" onclick="showRejectReason()">✗ Reject</button>
        <button class="action-btn btn-request" onclick="requestInfo()">? Request More Info</button>
      </div>

      <div class="reject-reason" id="rejectReasonWrap">
        <textarea id="rejectReason" placeholder="Reason for rejection (will be emailed to submitter)…"></textarea>
        <button class="action-btn btn-reject" style="margin-top:8px" onclick="confirmReject()">Confirm Rejection</button>
      </div>

      <!-- BUSINESS INFO -->
      <div class="data-section">
        <div class="data-section-title">Business Information</div>
        <div class="data-grid" id="detailBizInfo"></div>
      </div>

      <!-- OWNERSHIP INFO -->
      <div class="data-section">
        <div class="data-section-title">Ownership</div>
        <div class="data-grid" id="detailOwnership"></div>
        <div class="story-block" id="detailStory"></div>
      </div>

      <!-- CONTACT INFO -->
      <div class="data-section">
        <div class="data-section-title">Contact</div>
        <div class="data-grid" id="detailContact"></div>
      </div>

    </div>
  </div>
</div>

<script>
  const API_BASE = 'https://traceddatabase.onrender.com';
  let submissions = [];
  let currentFilter = 'pending';
  let currentId = null;
  let selectedZone = 'green';

  // ─── LOAD QUEUE ───────────────────────────────────────────────────────────

  async function loadQueue() {
    try {
      const res = await fetch(`${API_BASE}/api/admin/submissions?status=${currentFilter}`, {
        headers: { 'X-Admin-Key': getAdminKey() }
      });
      const data = await res.json();
      if (data.error) { showAuthPrompt(); return; }
      submissions = data.submissions || [];
      renderQueue();
      updateCounts(data.counts || {});
    } catch(e) {
      document.getElementById('queueList').innerHTML = '<div class="loading">Could not load submissions</div>';
    }
  }

  function getAdminKey() {
    let key = sessionStorage.getItem('adminKey');
    if (!key) {
      key = prompt('Admin key:');
      if (key) sessionStorage.setItem('adminKey', key);
    }
    return key || '';
  }

  function showAuthPrompt() {
    sessionStorage.removeItem('adminKey');
    document.getElementById('queueList').innerHTML = '<div class="loading">Invalid admin key</div>';
  }

  function updateCounts(counts) {
    document.getElementById('countPending').textContent = counts.pending || 0;
    document.getElementById('countApproved').textContent = counts.approved || 0;
    document.getElementById('countRejected').textContent = counts.rejected || 0;
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    loadQueue();
  }

  // ─── RENDER QUEUE ─────────────────────────────────────────────────────────

  function renderQueue() {
    const list = document.getElementById('queueList');
    if (!submissions.length) {
      list.innerHTML = '<div class="loading">No submissions</div>';
      return;
    }
    list.innerHTML = submissions.map(s => `
      <div class="queue-item ${s.id === currentId ? 'active' : ''}" onclick="selectSubmission(${s.id})">
        <div class="qi-top">
          <div class="qi-name">${s.biz_name}</div>
          <div class="qi-status ${s.status}">${s.status}</div>
        </div>
        <div class="qi-meta">${s.category} · ${s.address}<br>${s.submitted_at}</div>
      </div>
    `).join('');
  }

  // ─── SELECT SUBMISSION ────────────────────────────────────────────────────

  function selectSubmission(id) {
    currentId = id;
    const s = submissions.find(x => x.id === id);
    if (!s) return;

    renderQueue(); // re-render to update active state

    document.getElementById('emptyDetail').style.display = 'none';
    document.getElementById('detailContent').classList.add('visible');
    document.getElementById('actionResult').classList.remove('visible');
    document.getElementById('rejectReasonWrap').classList.remove('visible');

    document.getElementById('detailName').textContent = s.biz_name;
    document.getElementById('detailMeta').textContent = `${s.category} · Founded ${s.founded_year || '—'} · ${s.address}`;
    document.getElementById('detailRef').innerHTML = `Ref: ${s.ref_id}<br>${s.submitted_at}`;

    document.getElementById('detailBizInfo').innerHTML = dataRows([
      ['Address', s.address],
      ['Category', s.category],
      ['Founded', s.founded_year || '—'],
      ['Website', s.website ? `<a href="${s.website}" target="_blank">${s.website}</a>` : '—'],
      ['Google Maps', s.google_maps_url ? `<a href="${s.google_maps_url}" target="_blank">View on Maps →</a>` : '—'],
    ]);

    const investorLabel = {
      'no': 'No outside investment',
      'angel': 'Angel investors only',
      'seed': 'Seed funding',
      'vc': 'Venture capital / growth equity'
    };

    document.getElementById('detailOwnership').innerHTML = dataRows([
      ['Structure', s.ownership_type?.replace('_', ' ') || '—'],
      ['Owners', s.owner_names || '—'],
      ['Investment', investorLabel[s.has_investors] || s.has_investors || '—', s.has_investors === 'vc' ? 'red' : s.has_investors === 'no' ? 'green' : ''],
    ]);

    document.getElementById('detailStory').textContent = s.owner_story || 'No story provided.';

    document.getElementById('detailContact').innerHTML = dataRows([
      ['Name', s.contact_name || '—'],
      ['Role', s.contact_role || '—'],
      ['Email', s.contact_email ? `<a href="mailto:${s.contact_email}">${s.contact_email}</a>` : '—'],
      ['Instagram', s.instagram || '—'],
    ]);

    // disable actions if already actioned
    const actioned = s.status !== 'pending';
    document.getElementById('btnApprove').disabled = actioned;
    document.getElementById('btnReject').disabled = actioned;
  }

  function dataRows(rows) {
    return rows.map(([k, v, cls]) =>
      `<div class="data-row"><div class="data-key">${k}</div><div class="data-val ${cls||''}">${v}</div></div>`
    ).join('');
  }

  // ─── ZONE ─────────────────────────────────────────────────────────────────

  function setZone(z) {
    selectedZone = z;
    ['green','yellow','red'].forEach(c => {
      const el = document.getElementById('zone' + c.charAt(0).toUpperCase() + c.slice(1));
      el.className = 'zone-opt';
      if (c === z) el.classList.add(`selected-${c}`);
    });
  }

  // ─── ACTIONS ──────────────────────────────────────────────────────────────

  async function approveSubmission() {
    if (!currentId) return;
    const btn = document.getElementById('btnApprove');
    btn.disabled = true;
    btn.textContent = 'Approving…';

    try {
      const res = await fetch(`${API_BASE}/api/admin/submissions/${currentId}/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Key': getAdminKey() },
        body: JSON.stringify({ zone: selectedZone })
      });
      const data = await res.json();
      const resultEl = document.getElementById('actionResult');
      if (data.success) {
        resultEl.textContent = `✓ Approved and added to database as ${selectedZone} zone. Brand slug: ${data.slug}`;
        resultEl.className = 'action-result visible success';
        loadQueue();
      } else {
        resultEl.textContent = `Error: ${data.error}`;
        resultEl.className = 'action-result visible error';
        btn.disabled = false;
        btn.textContent = '✓ Approve + Add to DB';
      }
    } catch(e) {
      document.getElementById('actionResult').textContent = 'Request failed';
      document.getElementById('actionResult').className = 'action-result visible error';
      btn.disabled = false;
      btn.textContent = '✓ Approve + Add to DB';
    }
  }

  function showRejectReason() {
    document.getElementById('rejectReasonWrap').classList.add('visible');
    document.getElementById('rejectReason').focus();
  }

  async function confirmReject() {
    if (!currentId) return;
    const reason = document.getElementById('rejectReason').value.trim();
    try {
      const res = await fetch(`${API_BASE}/api/admin/submissions/${currentId}/reject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Key': getAdminKey() },
        body: JSON.stringify({ reason })
      });
      const data = await res.json();
      const resultEl = document.getElementById('actionResult');
      if (data.success) {
        resultEl.textContent = '✗ Submission rejected.';
        resultEl.className = 'action-result visible error';
        document.getElementById('rejectReasonWrap').classList.remove('visible');
        loadQueue();
      }
    } catch(e) {}
  }

  async function requestInfo() {
    alert('Email request feature — wire to your email provider in the backend.');
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  loadQueue();
  setInterval(loadQueue, 30000); // auto-refresh every 30s
</script>

</body>
</html>
